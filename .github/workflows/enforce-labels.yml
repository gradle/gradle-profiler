name: Enforce PR labels for release drafter

on:
  pull_request:
    types: [labeled, unlabeled, opened, edited, synchronize]
jobs:
  enforce-label:
    runs-on: ubuntu-latest
    # Adds a 5-minute wait before running, so authors have time to add labels before the check fails.
    # The delay is configured in repo Settings > Environments > "delayed-check" > Wait timer.
    environment: delayed-check
    steps:
    - uses: yogevbd/enforce-label-action@2.2.2
      with:
        REQUIRED_LABELS_ANY: "bug,enhancement,internal,no-changelog"
        REQUIRED_LABELS_ANY_DESCRIPTION: "Select at least one label ['bug','enhancement','internal','no-changelog'] for the PR"


name: Send new issues and PRs to triage

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  add-to-triage:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: gradle/issue-management-action/new-triage@v2
